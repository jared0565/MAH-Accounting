<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MAH Chartered Accountants</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .page-header {
            padding: 150px 0 80px;
            background-color: var(--clr-primary-dark);
            color: var(--clr-background);
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="header" id="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <span class="logo-text">MAH</span>
                <span class="logo-subtext">Chartered Accountants</span>
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="index.html#services" class="nav-link">Services</a></li>
                    <li><a href="sectors.html" class="nav-link">Sectors</a></li>
                    <li><a href="index.html#testimonials" class="nav-link">Testimonials</a></li>
                    <li><a href="index.html#contact" class="nav-link">Contact</a></li>
                </ul>
            </nav>
            <div class="header-cta">
                <a href="tel:02071003610" class="btn btn-secondary">Call Us</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1 class="animate-up">Contact Us</h1>
                <p class="animate-up delay-1">Get your free, no-obligation consultation.</p>
            </div>
        </div>

        <section class="section">
            <div class="container section-container">
                <!-- Reusing the CTA structure from main index but centering it slightly -->
                <div class="cta-wrapper scroll-animate animate-fade-up"
                    style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto; background: var(--clr-surface); padding: var(--space-8); border-radius: var(--radius-xl);">
                    <div class="cta-form-container" style="box-shadow: none; background: transparent; padding: 0;">
                        <form class="lead-capture-form">
                            <h3 style="text-align: left; font-size: 2rem;">Send us a message</h3>
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" placeholder="John Doe" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Work Email</label>
                                <input type="email" id="email" placeholder="john@company.com" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" placeholder="020..." required>
                            </div>
                            <div class="form-group">
                                <label for="message">How can we help?</label>
                                <textarea id="message" rows="4"
                                    style="width:100%; padding:var(--space-3); border:1px solid rgba(0,0,0,0.1); border-radius:var(--radius-md); font-family:var(--font-body); resize:vertical;"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Send Message</button>
                        </form>
                    </div>
                </div>

                <!-- Google Map Embed -->
                <div class="map-container"
                    style="margin-top: 4rem; width: 100%; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md);">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2482.6859664585147!2d-0.084120823521639!3d51.51897261120288!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x48761cb05ccb1af5%3A0xe53ea4dd53eada8!2sLiverpool%20St%2C%20London!5e0!3m2!1sen!2suk!4v1709440312000!5m2!1sen!2suk"
                        width="100%" height="450" style="border:0; display: block;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade" title="MAH Accounting Location Map"></iframe>
                </div>
            </div>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/main.js"></script>
</body>

</html>
